<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web BLE Radar</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Radar UI */
        .radar-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .radar-cone {
            width: 0;
            height: 0;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
            border-top: 200px solid #00a8ff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            transition: all 0.3s ease;
        }

        .distance-text {
            position: absolute;
            top: 60px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            z-index: 10;
        }

        /* Details UI */
        .details-container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
        }

        .detail-row {
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .value {
            font-size: 18px;
            font-weight: bold;
        }

        .highlight { color: #00a8ff; }

        button {
            background-color: #00a8ff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            font-weight: bold;
        }

        button:active { background-color: #0080cc; }
    </style>
</head>
<body>

    <div class="radar-container">
        <div class="radar-cone" id="radarVis"></div>
        <div class="distance-text" id="distanceDisplay">-- m</div>
    </div>

    <div class="details-container">
        <div class="detail-row">
            <div class="label">Device name</div>
            <div class="value" id="deviceName">Waiting...</div>
        </div>
        
        <div class="detail-row">
            <div class="label">Browser ID (MAC is hidden by browser)</div>
            <div class="value" id="deviceId">--</div>
        </div>

        <div class="detail-row">
            <div class="label">Signal Strength (RSSI)</div>
            <div class="value highlight" id="rssiDisplay">-- dBm</div>
        </div>
    </div>

    <button id="scanBtn">Select Device to Track</button>

    <script>
        let bluetoothDevice;

        document.getElementById('scanBtn').addEventListener('click', async () => {
            try {
                // 1. Open Browser Popup
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true
                });

                // 2. Update Basic Info
                document.getElementById('deviceName').textContent = bluetoothDevice.name || 'UNKNOWN DEVICE';
                document.getElementById('deviceId').textContent = bluetoothDevice.id;
                document.getElementById('scanBtn').textContent = "Tracking...";

                // 3. Try to start listening for signal strength (RSSI)
                // Note: watchAdvertisements is experimental in browsers!
                if (!bluetoothDevice.watchAdvertisements) {
                    alert("Your browser does not support live signal tracking (watchAdvertisements). You will only see the name and ID.");
                    return;
                }

                bluetoothDevice.addEventListener('advertisementreceived', (event) => {
                    let rssi = event.rssi;
                    document.getElementById('rssiDisplay').textContent = `${rssi} dBm`;
                    
                    // Calculate rough distance based on RSSI
                    // Formula: 10 ^ ((TxPower - RSSI) / (10 * 2))
                    let txPower = event.txPower || -59; // Default BLE txPower
                    let ratio = (txPower - rssi) / (10 * 2);
                    let distance = Math.pow(10, ratio);
                    
                    // Format to 2 decimal places
                    let distanceFormatted = distance.toFixed(2);
                    document.getElementById('distanceDisplay').textContent = `${distanceFormatted}m`;

                    // Animate the radar cone slightly based on signal strength
                    let scale = Math.max(0.3, Math.min(1.2, (100 + rssi) / 50));
                    document.getElementById('radarVis').style.transform = `scale(${scale})`;
                });

                await bluetoothDevice.watchAdvertisements();

            } catch (error) {
                console.error(error);
                if(error.name === 'NotFoundError') {
                    alert("You cancelled the pairing menu.");
                } else {
                    alert("Error: " + error.message + "\n\nMake sure Experimental Web Platform features are enabled in your browser.");
                }
                document.getElementById('scanBtn').textContent = "Select Device to Track";
            }
        });
    </script>
</body>
</html>
