<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Finding</title>
    <style>
        :root {
            --bg-color: #304349; /* Dark teal/gray from screenshot */
            --bg-success: #1a6b2d; /* Apple green when close */
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.8s ease;
        }

        /* Top Header */
        .header {
            padding: 50px 20px 20px;
        }
        .finding-text {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .device-name {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Center Stage (Arrow) */
        .center-stage {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .arrow-container {
            width: 180px;
            height: 180px;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease;
            opacity: 0.2; /* Dim until connected */
        }

        /* Apple-style rounded arrow SVG */
        .arrow-svg {
            width: 100%;
            height: 100%;
            fill: white;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.2));
        }

        /* Bottom Info Panel */
        .info-panel {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .distance-display {
            font-size: 72px;
            font-weight: 600;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 5px;
            display: flex;
            align-items: baseline;
        }
        
        .unit {
            font-size: 32px;
            font-weight: 500;
            margin-left: 8px;
            color: var(--text-muted);
        }

        .direction-text {
            font-size: 28px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .direction-text strong {
            color: white;
            font-weight: 600;
        }

        /* Connect Button (Replaces Apple's bottom buttons for web functionality) */
        .connect-btn {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            width: 100%;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .connect-btn:active {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Utility classes */
        .hidden { display: none !important; }
        .pulsing { animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="finding-text">FINDING</div>
        <h1 class="device-name" id="deviceNameUi">Unknown Device</h1>
    </div>

    <div class="center-stage">
        <div class="arrow-container" id="arrowBox">
            <!-- Custom SVG Arrow mimicking Apple's thick, rounded design -->
            <svg class="arrow-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 15 L80 45 C83 48 83 52 80 55 C77 58 73 58 70 55 L57 42 L57 78 C57 82 54 85 50 85 C46 85 43 82 43 78 L43 42 L30 55 C27 58 23 58 20 55 C17 52 17 48 20 45 L50 15 Z" />
            </svg>
        </div>
    </div>

    <div class="info-panel">
        <div class="distance-display" id="distanceUi">
            <span id="distNumber">--</span>
            <span class="unit">ft</span>
        </div>
        <div class="direction-text" id="statusText">Tap connect to start</div>
        
        <button class="connect-btn" id="scanBtn">Connect to Tracker</button>
    </div>

    <script>
        let bluetoothDevice;
        let smoothedRssi = null;
        let previousDistance = null;

        const scanBtn = document.getElementById('scanBtn');
        const arrowBox = document.getElementById('arrowBox');
        const distNumber = document.getElementById('distNumber');
        const statusText = document.getElementById('statusText');
        const deviceNameUi = document.getElementById('deviceNameUi');

        scanBtn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                alert("Web Bluetooth is not supported on this browser.");
                return;
            }

            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_access']
                });

                // Update UI for Connection
                deviceNameUi.textContent = bluetoothDevice.name || 'Bluetooth Tracker';
                scanBtn.classList.add('hidden'); // Hide button once connected
                arrowBox.style.opacity = "1";
                arrowBox.classList.add('pulsing');
                statusText.innerHTML = "Connecting...";

                if (!bluetoothDevice.watchAdvertisements) {
                    statusText.innerHTML = "Live tracking not supported.";
                    return;
                }

                bluetoothDevice.addEventListener('advertisementreceived', (event) => {
                    let rawRssi = event.rssi;
                    
                    // 1. Math Filter to smooth the bouncy signal
                    if (smoothedRssi === null) {
                        smoothedRssi = rawRssi;
                    } else {
                        smoothedRssi = (0.15 * rawRssi) + (0.85 * smoothedRssi);
                    }

                    // 2. Calculate Distance in Meters, then convert to Feet
                    const rssiAtOneMeter = -69; 
                    const envFactor = 2.5; 
                    let ratio = (rssiAtOneMeter - smoothedRssi) / (10 * envFactor);
                    let distanceMeters = Math.pow(10, ratio);
                    let distanceFeet = distanceMeters * 3.28084;
                    
                    // Update Number UI
                    distNumber.textContent = distanceFeet.toFixed(1);
                    arrowBox.classList.remove('pulsing'); // Stop pulsing once we have data

                    // 3. The "Hot/Cold" Game Logic (Since we don't have UWB angle)
                    if (previousDistance !== null) {
                        let diff = distanceFeet - previousDistance;
                        
                        if (distanceFeet < 3.0) {
                            // VERY CLOSE (Under 3 feet)
                            document.body.style.backgroundColor = "var(--bg-success)";
                            arrowBox.style.transform = "rotate(0deg) scale(1.2)";
                            statusText.innerHTML = "<strong>Right here</strong>";
                        } 
                        else if (diff < -0.3) {
                            // GETTING CLOSER (Walk forward)
                            document.body.style.backgroundColor = "var(--bg-color)";
                            arrowBox.style.transform = "rotate(0deg)"; // Point UP
                            statusText.innerHTML = "Getting <strong>closer</strong>";
                        } 
                        else if (diff > 0.3) {
                            // GETTING FURTHER (Walk back)
                            document.body.style.backgroundColor = "var(--bg-color)";
                            arrowBox.style.transform = "rotate(180deg)"; // Point DOWN
                            statusText.innerHTML = "Moving <strong>away</strong>";
                        }
                    }
                    
                    previousDistance = distanceFeet;
                });

                await bluetoothDevice.watchAdvertisements();
                statusText.innerHTML = "Walk around to find it";

            } catch (error) {
                console.error("Bluetooth Error:", error);
                if(error.name !== 'NotFoundError') {
                    alert("Error: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
