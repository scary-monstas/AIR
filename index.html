<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Radar</title>
    <style>
        :root {
            --bg-search: #304349;
            --bg-success: #1a6b2d;
            --bg-far: #8b0000;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-search);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Top Header */
        .header { padding: 50px 20px 20px; text-align: center; }
        .finding-text {
            font-size: 13px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px;
        }
        .device-name { font-size: 32px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }

        /* Center Stage (Arrow) */
        .center-stage {
            flex-grow: 1; display: flex; justify-content: center;
            align-items: center; position: relative;
        }
        
        .arrow-container {
            width: 180px; height: 180px;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            opacity: 0.1;
        }

        .arrow-svg {
            width: 100%; height: 100%; fill: white;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.3));
        }

        /* Bottom Info Panel */
        .info-panel {
            padding: 30px; text-align: center;
            background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
        }
        
        .distance-display {
            font-size: 84px; font-weight: 700; letter-spacing: -3px;
            line-height: 1; margin-bottom: 5px; display: flex; 
            justify-content: center; align-items: baseline;
        }
        
        .unit { font-size: 32px; font-weight: 600; margin-left: 8px; color: var(--text-muted); letter-spacing: 0; }
        
        .dbm-display {
            font-size: 18px; font-weight: 600; color: #00ffcc;
            font-family: monospace; margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .direction-text { font-size: 24px; font-weight: 500; color: var(--text-muted); margin-bottom: 30px; }
        .direction-text strong { color: white; font-weight: 600; }

        /* Connect Button */
        .connect-btn {
            background-color: rgba(255, 255, 255, 0.2); color: white; border: none;
            padding: 20px; font-size: 20px; font-weight: 700; border-radius: 40px;
            width: 100%; max-width: 350px; margin: 0 auto; display: block;
            backdrop-filter: blur(10px); cursor: pointer; transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .connect-btn:active { transform: scale(0.95); background-color: rgba(255, 255, 255, 0.3); }

        .hidden { display: none !important; }
        .pulsing { animation: pulse 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.3; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="finding-text" id="findingStatus">READY TO SCAN</div>
        <h1 class="device-name" id="deviceNameUi">--</h1>
    </div>

    <div class="center-stage">
        <div class="arrow-container" id="arrowBox">
            <svg class="arrow-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 15 L80 45 C83 48 83 52 80 55 C77 58 73 58 70 55 L57 42 L57 78 C57 82 54 85 50 85 C46 85 43 82 43 78 L43 42 L30 55 C27 58 23 58 20 55 C17 52 17 48 20 45 L50 15 Z" />
            </svg>
        </div>
    </div>

    <div class="info-panel">
        <div class="distance-display hidden" id="distanceUi">
            <span id="distNumber">0.0</span><span class="unit">ft</span>
        </div>
        <div class="dbm-display hidden" id="dbmUi">-- dBm</div>
        
        <div class="direction-text" id="statusText">Tap below to begin</div>
        <button class="connect-btn" id="scanBtn">Connect to Tracker</button>
    </div>

    <script>
        let bluetoothDevice;
        let smoothedRssi = null;
        let previousDistance = null;

        // UI Elements
        const scanBtn = document.getElementById('scanBtn');
        const arrowBox = document.getElementById('arrowBox');
        const distNumber = document.getElementById('distNumber');
        const statusText = document.getElementById('statusText');
        const deviceNameUi = document.getElementById('deviceNameUi');
        const distanceUi = document.getElementById('distanceUi');
        const dbmUi = document.getElementById('dbmUi');
        const findingStatus = document.getElementById('findingStatus');

        // Constants for Physics Math
        const RSSI_AT_ONE_METER = -69; 
        const ENVIRONMENT_FACTOR = 2.5; 

        scanBtn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                alert("Web Bluetooth is not supported on this browser.");
                return;
            }

            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_access']
                });

                // Setup UI for Active Tracking
                deviceNameUi.textContent = bluetoothDevice.name || 'Unknown Tracker';
                findingStatus.textContent = "SEARCHING FOR SIGNAL";
                scanBtn.classList.add('hidden'); 
                distanceUi.classList.remove('hidden');
                dbmUi.classList.remove('hidden');
                
                arrowBox.style.opacity = "1";
                arrowBox.classList.add('pulsing');
                statusText.innerHTML = "Connecting...";

                if (!bluetoothDevice.watchAdvertisements) {
                    statusText.innerHTML = "Live tracking not supported on this device.";
                    return;
                }

                // Listen for live pings
                bluetoothDevice.addEventListener('advertisementreceived', (event) => {
                    let rawRssi = event.rssi;
                    
                    // --- DYNAMIC FILTER ALGORITHM ---
                    // This makes it instantly responsive when moving, but stable when standing still.
                    if (smoothedRssi === null) {
                        smoothedRssi = rawRssi;
                    } else {
                        let diff = Math.abs(rawRssi - smoothedRssi);
                        // If signal jumps by more than 3dBm, trust the new signal more (moving fast)
                        // If it barely changes, smooth it heavily (standing still)
                        let alpha = diff > 3 ? 0.6 : 0.15; 
                        smoothedRssi = (alpha * rawRssi) + ((1 - alpha) * smoothedRssi);
                    }

                    // --- ACCURATE DISTANCE MATH ---
                    let ratio = (RSSI_AT_ONE_METER - smoothedRssi) / (10 * ENVIRONMENT_FACTOR);
                    let distanceMeters = Math.pow(10, ratio);
                    let distanceFeet = distanceMeters * 3.28084;

                    // --- UPDATE UI ---
                    dbmUi.textContent = `${rawRssi} dBm (Raw) | ${smoothedRssi.toFixed(1)} (Calc)`;
                    distNumber.textContent = distanceFeet.toFixed(1);
                    findingStatus.textContent = "TRACKING LIVE";
                    arrowBox.classList.remove('pulsing'); 

                    // --- DIRECTION & HAPTICS ENGINE ---
                    if (previousDistance !== null) {
                        let distanceDiff = distanceFeet - previousDistance;
                        
                        if (distanceFeet < 3.0) {
                            // GREEN ZONE (Under 3 feet)
                            document.body.style.backgroundColor = "var(--bg-success)";
                            arrowBox.style.transform = "rotate(0deg) scale(1.3)";
                            statusText.innerHTML = "<strong>Right here</strong>";
                            if (navigator.vibrate) navigator.vibrate([30, 70, 30]); 
                        } 
                        else if (distanceFeet > 30.0) {
                            // FAR ZONE (Lost signal / Very far)
                            document.body.style.backgroundColor = "var(--bg-far)";
                            arrowBox.style.transform = "rotate(180deg) scale(0.8)";
                            statusText.innerHTML = "Signal is <strong>weak</strong>";
                        }
                        else if (distanceDiff < -0.3) {
                            // HOT: Getting closer
                            document.body.style.backgroundColor = "var(--bg-search)";
                            arrowBox.style.transform = "rotate(0deg)"; 
                            statusText.innerHTML = "Getting <strong>closer</strong>";
                            if (navigator.vibrate) navigator.vibrate(15); 
                        } 
                        else if (distanceDiff > 0.3) {
                            // COLD: Moving away
                            document.body.style.backgroundColor = "var(--bg-search)";
                            arrowBox.style.transform = "rotate(180deg)"; 
                            statusText.innerHTML = "Moving <strong>away</strong>";
                        }
                    }
                    
                    previousDistance = distanceFeet;
                });

                // Start the hardware scan
                await bluetoothDevice.watchAdvertisements();
                statusText.innerHTML = "Walk around to calibrate...";

            } catch (error) {
                console.error("Bluetooth Error:", error);
                if(error.name !== 'NotFoundError') alert("System Error: " + error.message);
            }
        });
    </script>
</body>
</html>
