<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web BLE Radar</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Radar UI */
        .radar-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .radar-cone {
            width: 0;
            height: 0;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
            border-top: 200px solid #00a8ff;
            border-radius: 50%;
            position: absolute;
            top: 0;
            transition: all 0.3s ease;
        }

        .distance-text {
            position: absolute;
            top: 60px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            z-index: 10;
        }

        /* Details UI */
        .details-container {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
        }

        .detail-row {
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .value {
            font-size: 18px;
            font-weight: bold;
        }

        .highlight { color: #00a8ff; }

        button {
            background-color: #00a8ff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            font-weight: bold;
        }

        button:active { background-color: #0080cc; }
    </style>
</head>
<body>

    <div class="radar-container">
        <div class="radar-cone" id="radarVis"></div>
        <div class="distance-text" id="distanceDisplay">-- m</div>
    </div>

    <div class="details-container">
        <div class="detail-row">
            <div class="label">Device name</div>
            <div class="value" id="deviceName">Waiting...</div>
        </div>
        
        <div class="detail-row">
            <div class="label">Browser ID (MAC is hidden by browser)</div>
            <div class="value" id="deviceId">--</div>
        </div>

        <div class="detail-row">
            <div class="label">Signal Strength (RSSI)</div>
            <div class="value highlight" id="rssiDisplay">-- dBm</div>
        </div>
    </div>

    <button id="scanBtn">Select Device to Track</button>

<script>
        let bluetoothDevice;
        let smoothedRssi = null; // Used to smooth out the bouncy signal

        document.getElementById('scanBtn').addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                alert("❌ Web Bluetooth is DISABLED.");
                return;
            }

            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['generic_access']
                });

                document.getElementById('deviceName').textContent = bluetoothDevice.name || 'UNKNOWN DEVICE';
                document.getElementById('deviceId').textContent = bluetoothDevice.id;
                document.getElementById('scanBtn').textContent = "Tracking Live Data...";

                if (!bluetoothDevice.watchAdvertisements) {
                    alert("watchAdvertisements not supported.");
                    return;
                }

                bluetoothDevice.addEventListener('advertisementreceived', (event) => {
                    let rawRssi = event.rssi;
                    
                    // 1. SMOOTHING FILTER
                    // Bluetooth signals bounce wildly. This averages the new signal with the old signal.
                    if (smoothedRssi === null) {
                        smoothedRssi = rawRssi;
                    } else {
                        // 15% new signal, 85% old signal (Keeps it stable)
                        smoothedRssi = (0.15 * rawRssi) + (0.85 * smoothedRssi);
                    }

                    // Update UI with the exact raw signal for debugging
                    document.getElementById('rssiDisplay').textContent = `${rawRssi} dBm (Smoothed: ${smoothedRssi.toFixed(1)})`;
                    
                    // 2. THE DISTANCE MATH
                    // -69 is the average RSSI when a device is exactly 1 meter away.
                    const rssiAtOneMeter = -69; 
                    
                    // Environmental factor: 2 = open field, 3 = indoor room, 4 = heavy walls
                    const environmentFactor = 2.5; 

                    let ratio = (rssiAtOneMeter - smoothedRssi) / (10 * environmentFactor);
                    let distance = Math.pow(10, ratio);
                    
                    // Update Distance UI
                    document.getElementById('distanceDisplay').textContent = `${distance.toFixed(2)}m`;

                    // 3. RADAR ANIMATION
                    let scale = Math.max(0.2, Math.min(1.5, (100 + smoothedRssi) / 60));
                    document.getElementById('radarVis').style.transform = `scale(${scale})`;
                    
                    if (distance < 1.0) {
                        document.getElementById('radarVis').style.borderTopColor = "#2ecc71"; // Green (Under 1 meter)
                    } else if (distance < 4.0) {
                        document.getElementById('radarVis').style.borderTopColor = "#f1c40f"; // Yellow (Under 4 meters)
                    } else {
                        document.getElementById('radarVis').style.borderTopColor = "#e74c3c"; // Red (Far away)
                    }
                });

                await bluetoothDevice.watchAdvertisements();

            } catch (error) {
                console.error("Bluetooth Error:", error);
                if(error.name !== 'NotFoundError') {
                    alert("Error: " + error.message);
                }
                document.getElementById('scanBtn').textContent = "Select Device to Track";
            }
        });
    </script>
</body>
</html>
